#:schema node_modules/wrangler/config-schema.json
name = "odds-copilot"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".open-next"

# Note: Build configuration is set in Cloudflare Pages dashboard
# Build command: npm run build:cloudflare
# Build output directory: .open-next
#
# Using OpenNext adapter for Cloudflare Pages
# See: https://opennext.js.org/cloudflare
#
# Environment variables to set in Cloudflare dashboard:
# - NEXT_PUBLIC_SITE_URL (already in .env.production)
# - NEXT_PUBLIC_SUPABASE_URL (already in .env.production)
# - NEXT_PUBLIC_SUPABASE_ANON_KEY (already in .env.production)
# - ANTHROPIC_API_KEY (for API routes)
